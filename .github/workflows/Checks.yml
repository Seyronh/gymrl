name: Checks

on:
  pull_request:
    branches:
      - main

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install

      - name: Test
        run: bun run test
      - name: Build
        run: bun run build
